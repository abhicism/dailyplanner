<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#f5f0e8; --paper:#fdfaf5; --ink:#1a1410; --ink-light:#5c4f3d;
  --accent:#c8440a; --accent-pale:#f5d8c8; --rule:#d8ccb8;
  --done-bg:#e6f2dc; --done-border:#7aaa5a; --done-text:#4a7a30;
  --current-bg:#fff8e1; --current-border:#e6a817;
  --missed-bg:#fde8e8; --missed-border:#d94040;
  --upcoming-bg:#eef3ff; --upcoming-border:#6b8cda;
}

/* ── KEYFRAMES ───────────────────────────────────────────────────── */
@keyframes rise {
  from { opacity:0; transform:translateY(24px) scale(.98); }
  to   { opacity:1; transform:translateY(0)   scale(1); }
}
@keyframes fadeIn {
  from { opacity:0; transform:translateX(-8px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes slideDown {
  from { opacity:0; transform:translateY(-10px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes popIn {
  0%   { opacity:0; transform:scale(.6) rotate(-8deg); }
  70%  { transform:scale(1.15) rotate(3deg); }
  100% { opacity:1; transform:scale(1) rotate(0); }
}
@keyframes blink {
  0%,100% { opacity:1; }
  50%      { opacity:.25; }
}
@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position:  400px 0; }
}
@keyframes pulseGlow {
  0%,100% { box-shadow: 0 0 0 2px rgba(230,168,23,.15); }
  50%      { box-shadow: 0 0 0 5px rgba(230,168,23,.30); }
}
@keyframes progressFill {
  from { width:0; }
}
@keyframes checkBounce {
  0%   { transform:scale(1); }
  30%  { transform:scale(.82); }
  60%  { transform:scale(1.22); }
  80%  { transform:scale(.95); }
  100% { transform:scale(1); }
}
@keyframes strikeThrough {
  from { text-decoration-color:transparent; }
  to   { text-decoration-color:currentColor; }
}
@keyframes statPop {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.3) translateY(-3px); }
  100% { transform:scale(1); }
}
@keyframes headerReveal {
  from { opacity:0; transform:translateY(-100%); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes toastIn {
  from { opacity:0; transform:translateX(-50%) translateY(14px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}
@keyframes toastOut {
  from { opacity:1; transform:translateX(-50%) translateY(0); }
  to   { opacity:0; transform:translateX(-50%) translateY(10px); }
}
@keyframes dateNumDrop {
  from { opacity:0; transform:translateY(-20px) scale(.8); }
  to   { opacity:1; transform:translateY(0)     scale(1); }
}
@keyframes legendFade {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes clockTick {
  0%  { opacity:1; }
  45% { opacity:1; }
  50% { opacity:.4; }
  55% { opacity:1; }
}
@keyframes addBtnPulse {
  0%,100% { opacity:.65; }
  50%      { opacity:.9; }
}
@keyframes slotHighlight {
  0%   { background:rgba(230,168,23,.25); }
  100% { background:transparent; }
}
@keyframes rippleAnim {
  to { transform:scale(4); opacity:0; }
}

/* ── BODY / PAGE ─────────────────────────────────────────────────── */
body {
  font-family:'DM Mono',monospace; background:var(--bg); min-height:100vh; padding:32px 16px;
  background-image:
    radial-gradient(circle at 20% 80%, rgba(200,68,10,.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(143,168,122,.07) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(107,140,218,.04) 0%, transparent 60%);
}

/* ── PLANNER CARD ────────────────────────────────────────────────── */
.planner {
  max-width:700px; margin:0 auto; background:var(--paper); border-radius:3px;
  box-shadow:4px 4px 0 #c4b89a, 8px 8px 0 rgba(0,0,0,.08);
  overflow:hidden;
  animation: rise .55s cubic-bezier(.22,.68,0,1.2) both;
}

/* ── HEADER ──────────────────────────────────────────────────────── */
.header {
  background:var(--ink); color:var(--bg); padding:26px 34px;
  display:flex; justify-content:space-between; align-items:flex-end;
  overflow:hidden;
  animation: headerReveal .45s ease both;
}
.header h1 {
  font-family:'DM Serif Display',serif; font-size:2rem; line-height:1;
  animation: fadeIn .5s .15s ease both;
}
.header h1 em { color:var(--accent); font-style:italic; }
.date-box {
  text-align:right; font-size:.68rem; letter-spacing:.08em;
  text-transform:uppercase; opacity:.75;
  animation: fadeIn .5s .25s ease both;
}
.date-box strong {
  font-family:'DM Serif Display',serif; font-size:2.6rem; color:var(--accent);
  line-height:1; display:block; opacity:1;
  animation: dateNumDrop .55s .3s cubic-bezier(.22,.68,0,1.3) both;
}

/* ── TABS ────────────────────────────────────────────────────────── */
.tabs {
  display:flex; border-bottom:2px solid var(--ink);
  animation: slideDown .3s .4s ease both;
}
.tab {
  flex:1; padding:10px 6px; border:none; background:none; cursor:pointer;
  font-family:'DM Mono',monospace; font-size:.65rem; text-transform:uppercase;
  letter-spacing:.1em; color:var(--ink-light);
  border-bottom:2px solid transparent; margin-bottom:-2px;
  transition:color .22s;
  position:relative; overflow:hidden;
}
.tab::after {
  content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px;
  background:var(--accent); transform:scaleX(0); transform-origin:left;
  transition:transform .25s cubic-bezier(.22,.68,0,1.2);
}
.tab.on { color:var(--accent); }
.tab.on::after { transform:scaleX(1); }
.tab:hover:not(.on) { color:var(--ink); }
.tab-ripple {
  position:absolute; border-radius:50%; background:rgba(200,68,10,.15);
  transform:scale(0); animation:rippleAnim .5s ease-out;
  pointer-events:none;
}

/* ── STATS BAR ───────────────────────────────────────────────────── */
.stats {
  display:grid; grid-template-columns:repeat(4,1fr); border-bottom:1px solid var(--rule);
}
.stat {
  padding:10px 12px; text-align:center; border-right:1px solid var(--rule);
  animation: slideDown .35s ease both;
}
.stat:nth-child(1) { animation-delay:.42s; }
.stat:nth-child(2) { animation-delay:.47s; }
.stat:nth-child(3) { animation-delay:.52s; }
.stat:nth-child(4) { animation-delay:.57s; }
.stat:last-child { border-right:none; }
.slabel { font-size:.58rem; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-light); }
.sval {
  font-family:'DM Serif Display',serif; font-size:1.35rem;
  transition:transform .2s, color .3s;
  display:inline-block;
}
.sval.pop { animation:statPop .3s cubic-bezier(.22,.68,0,1.3); }
.sval.g { color:#4d8830; } .sval.r { color:var(--missed-border); } .sval.b { color:var(--upcoming-border); }

/* ── LEGEND ──────────────────────────────────────────────────────── */
.legend {
  display:flex; flex-wrap:wrap; gap:12px; padding:8px 34px;
  border-bottom:1px solid var(--rule);
}
.leg {
  display:flex; align-items:center; gap:5px; font-size:.59rem;
  text-transform:uppercase; letter-spacing:.07em; color:var(--ink-light);
  animation: legendFade .3s ease both;
}
.leg:nth-child(1) { animation-delay:.55s; }
.leg:nth-child(2) { animation-delay:.6s; }
.leg:nth-child(3) { animation-delay:.65s; }
.leg:nth-child(4) { animation-delay:.7s; }
.dot { width:9px; height:9px; border-radius:2px; transition:transform .2s; }
.leg:hover .dot { transform:scale(1.4) rotate(10deg); }

/* ── BODY ────────────────────────────────────────────────────────── */
.body {
  padding:20px 34px;
  animation: fadeIn .4s .6s ease both;
}
.slabel-row {
  font-size:.62rem; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-light);
  margin-bottom:8px; display:flex; align-items:center; gap:8px;
}
.slabel-row::after { content:''; flex:1; height:1px; background:var(--rule); }

/* ── FOCUS BOX ───────────────────────────────────────────────────── */
.focus-box {
  background:var(--accent-pale); border-left:3px solid var(--accent);
  padding:11px 16px; margin-bottom:18px; border-radius:0 2px 2px 0;
  transition:border-color .25s, box-shadow .25s, background .25s;
  position:relative; overflow:hidden;
}
.focus-box::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,
    transparent 0%, rgba(255,255,255,.35) 40%, rgba(255,255,255,.55) 50%, transparent 100%
  );
  background-size:200% 100%;
  opacity:0; transition:opacity .3s;
  pointer-events:none;
}
.focus-box:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px rgba(200,68,10,.12); }
.focus-box:focus-within::before { opacity:1; animation:shimmer 1.8s ease infinite; }
.focus-in {
  width:100%; background:transparent; border:none; outline:none;
  font-family:'DM Serif Display',serif; font-size:1rem; color:var(--ink);
  transition:opacity .2s;
}
.focus-in::placeholder { color:#b89e82; }

/* ── CLOCK ───────────────────────────────────────────────────────── */
.clock {
  font-size:.68rem; color:var(--ink-light); text-align:right; margin-bottom:7px;
  animation: fadeIn .3s .75s ease both;
}
.clock b { color:var(--current-border); animation:clockTick 2s ease infinite; }

/* ── SLOTS ───────────────────────────────────────────────────────── */
.slot {
  display:grid; grid-template-columns:80px 1fr 22px; align-items:start;
  gap:10px; padding:8px 10px; border-radius:4px; margin-bottom:3px;
  border:1px solid transparent;
  transition:background .4s ease, border-color .4s ease, box-shadow .4s ease, transform .2s ease;
  position:relative;
  animation: fadeIn .32s ease both;
  will-change:transform;
}
.slot:hover { transform:translateX(2px); }
.slot.s-done     { background:var(--done-bg);     border-color:var(--done-border); }
.slot.s-current  {
  background:var(--current-bg);  border-color:var(--current-border);
  animation:fadeIn .32s ease both, pulseGlow 2.4s ease infinite;
}
.slot.s-missed   { background:var(--missed-bg);   border-color:var(--missed-border); }
.slot.s-upcoming { background:var(--upcoming-bg); border-color:var(--upcoming-border); }
.slot.s-neutral  { border-color:var(--rule); }
.slot.just-added { animation: slotHighlight .6s ease both, fadeIn .32s ease both; }

.now-badge {
  display:none; position:absolute; right:38px; top:50%; transform:translateY(-50%);
  font-size:.5rem; color:var(--current-border); font-weight:600; letter-spacing:.1em;
  animation:blink 1.4s ease infinite;
}
.slot.s-current .now-badge { display:block; }

.tlabel {
  font-size:.66rem; color:var(--ink-light); font-weight:500; white-space:nowrap;
  transition:color .25s;
}
.slot.s-current .tlabel { color:var(--current-border); }
.slot.s-done    .tlabel { color:var(--done-border); }

.sinput {
  background:transparent; border:none; outline:none;
  font-family:'DM Mono',monospace; font-size:.8rem; color:var(--ink); width:100%; padding:1px 0;
  white-space:pre-wrap; word-break:break-word; overflow-wrap:break-word;
  resize:none; min-height:1.4em; line-height:1.5; field-sizing:content;
  transition:opacity .25s;
}
.sinput::placeholder { color:#c4b89a; }
.sinput.struck {
  text-decoration:line-through; opacity:.5;
  animation:strikeThrough .3s ease both;
}

/* ── CHECKBOX ────────────────────────────────────────────────────── */
.chk {
  width:20px; height:20px; border-radius:50%; border:1.5px solid var(--rule);
  background:transparent; cursor:pointer; display:flex; align-items:center;
  justify-content:center; font-size:10px; color:transparent;
  transition:border-color .2s, background .2s, color .15s, transform .15s;
  flex-shrink:0;
}
.chk:hover { border-color:var(--done-border); transform:scale(1.12); }
.chk.on {
  background:var(--done-border); border-color:var(--done-border); color:#fff;
  animation:checkBounce .4s cubic-bezier(.22,.68,0,1.3);
}
.chk.unchecking { animation:checkBounce .3s cubic-bezier(.22,.68,0,1.3) reverse; }

/* ── ADD BUTTON ──────────────────────────────────────────────────── */
.add-btn {
  display:flex; align-items:center; gap:7px; margin-top:6px; padding:6px 0;
  background:none; border:none; font-family:'DM Mono',monospace; font-size:.7rem;
  color:var(--ink-light); cursor:pointer;
  opacity:.65; transition:opacity .2s, transform .2s, color .2s;
  animation:addBtnPulse 3s ease infinite;
}
.add-btn:hover { opacity:1; color:var(--accent); transform:translateX(3px); animation:none; }
.add-btn .ic {
  width:17px; height:17px; border:1.5px solid currentColor; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:13px;
  transition:transform .25s cubic-bezier(.22,.68,0,1.4), border-color .2s;
}
.add-btn:hover .ic { transform:rotate(90deg) scale(1.1); }

/* ── PROGRESS ────────────────────────────────────────────────────── */
.prog-wrap { background:var(--rule); height:4px; border-radius:3px; margin:8px 0; overflow:hidden; }
.prog-bar {
  height:100%; background:linear-gradient(90deg,#7aaa5a,#4d8830);
  border-radius:3px;
  transition:width .6s cubic-bezier(.22,.68,0,1.2);
  width:0; position:relative; overflow:hidden;
}
.prog-bar::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.45) 50%,transparent 100%);
  background-size:200% 100%;
  animation:shimmer 2.2s ease infinite;
}

/* ── NOTES ───────────────────────────────────────────────────────── */
.notes-ta {
  width:100%; min-height:60px; background:transparent; border:none; outline:none;
  resize:none; font-family:'DM Mono',monospace; font-size:.79rem; color:var(--ink); line-height:1.8;
  background-image:repeating-linear-gradient(transparent,transparent calc(1.8em - 1px),var(--rule) calc(1.8em - 1px),var(--rule) 1.8em);
  transition:opacity .25s;
}
.notes-ta::placeholder { color:#c4b89a; }

/* ── FOOTER ──────────────────────────────────────────────────────── */
.footer {
  padding:12px 34px; border-top:1px solid var(--rule);
  display:flex; justify-content:space-between; align-items:center;
  flex-wrap:wrap; gap:8px;
  animation: slideDown .35s .65s ease both;
}
.ptext { font-size:.63rem; text-transform:uppercase; letter-spacing:.07em; color:var(--ink-light); transition:color .3s; }
.btns { display:flex; gap:7px; }
.btn {
  background:none; border:1px solid var(--rule); font-family:'DM Mono',monospace;
  font-size:.61rem; text-transform:uppercase; letter-spacing:.07em; color:var(--ink-light);
  padding:5px 13px; cursor:pointer; border-radius:2px;
  transition:border-color .2s, color .2s, background .2s, transform .15s, box-shadow .2s;
}
.btn:hover {
  border-color:var(--accent); color:var(--accent);
  transform:translateY(-1px); box-shadow:0 2px 8px rgba(200,68,10,.15);
}
.btn:active { transform:translateY(0); box-shadow:none; }
.btn.primary { border-color:var(--ink); color:var(--ink); }
.btn.primary:hover { background:var(--ink); color:var(--bg); box-shadow:0 2px 8px rgba(26,20,16,.2); }

/* ── HIDDEN / HISTORY ────────────────────────────────────────────── */
.hidden { display:none !important; }

.hist-empty {
  text-align:center; padding:36px 20px; color:var(--ink-light);
  font-size:.78rem; opacity:.6; line-height:1.7;
  animation:fadeIn .4s ease both;
}
.hday {
  border:1px solid var(--rule); border-radius:4px; margin-bottom:10px; overflow:hidden;
  animation:fadeIn .3s ease both;
  transition:box-shadow .2s, border-color .2s;
}
.hday:hover { border-color:#bbb0a0; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hday-head {
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 15px; background:var(--bg); cursor:pointer;
  font-size:.68rem; letter-spacing:.06em; text-transform:uppercase;
  transition:background .2s;
}
.hday-head:hover { background:#ede8df; }
.hday-head .hd { font-weight:500; color:var(--ink); }
.hday-head .hs { color:#4d8830; }
.hday-head .hm { color:var(--missed-border); margin-left:7px; }
.htasks { padding:0 15px 10px; }
.htask {
  display:flex; align-items:center; gap:8px; padding:4px 0;
  border-bottom:1px dashed var(--rule); font-size:.71rem;
  animation:fadeIn .25s ease both;
}
.htask:last-child { border-bottom:none; }
.hdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; transition:transform .2s; }
.htask:hover .hdot { transform:scale(1.5); }
.hdot.d { background:var(--done-border); }
.hdot.m { background:var(--missed-border); }
.htime { color:var(--ink-light); font-size:.62rem; min-width:58px; }
.htxt  { color:var(--ink); flex:1; }
.hnotes { margin-top:7px; padding-top:7px; border-top:1px solid var(--rule); font-size:.7rem; color:var(--ink-light); }
.clear-hist {
  margin-top:12px; background:none; border:1px dashed var(--missed-border);
  font-family:'DM Mono',monospace; font-size:.61rem; text-transform:uppercase;
  letter-spacing:.06em; color:var(--missed-border); padding:5px 14px;
  cursor:pointer; border-radius:2px;
  opacity:.7; transition:opacity .2s, transform .15s, background .2s;
}
.clear-hist:hover { opacity:1; transform:translateY(-1px); background:rgba(217,64,64,.06); }

/* ── AUTH BOX ────────────────────────────────────────────────────── */
#authBox {
  max-width:420px; margin:80px auto; background:var(--paper); border-radius:3px;
  box-shadow:4px 4px 0 #c4b89a, 8px 8px 0 rgba(0,0,0,.08);
  padding:36px; text-align:center; font-family:'DM Mono',monospace;
  animation:rise .5s ease both;
}
#authBox h2 { font-family:'DM Serif Display',serif; font-size:1.6rem; margin-bottom:22px; color:var(--ink); }
#authBox input {
  width:100%; padding:10px 14px; margin:5px 0; border:1px solid var(--rule);
  background:var(--bg); font-family:'DM Mono',monospace; font-size:.8rem;
  color:var(--ink); border-radius:2px; outline:none;
  transition:border-color .2s, box-shadow .2s;
}
#authBox input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(200,68,10,.1); }
#authBox .auth-btns { display:flex; gap:8px; margin-top:14px; }
#authBox .auth-btns button {
  flex:1; padding:9px; border:1px solid var(--ink); background:none;
  font-family:'DM Mono',monospace; font-size:.7rem; text-transform:uppercase;
  letter-spacing:.07em; cursor:pointer; color:var(--ink); border-radius:2px;
  transition:background .2s, color .2s, transform .15s, box-shadow .2s;
}
#authBox .auth-btns button:hover {
  background:var(--ink); color:var(--bg);
  transform:translateY(-1px); box-shadow:0 3px 10px rgba(26,20,16,.2);
}
#authBox .auth-btns button:active { transform:translateY(0); }
#authBox .auth-btns button.sec { border-color:var(--rule); color:var(--ink-light); }
#authBox .auth-btns button.sec:hover { border-color:var(--accent); color:var(--accent); background:none; }
#authMsg { margin-top:12px; font-size:.72rem; color:var(--missed-border); min-height:1.2em; }

/* ── TOAST ───────────────────────────────────────────────────────── */
#toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:var(--bg); padding:9px 22px; border-radius:4px;
  font-family:'DM Mono',monospace; font-size:.76rem; letter-spacing:.06em;
  opacity:0; pointer-events:none; z-index:999; white-space:nowrap;
}
#toast.show { animation:toastIn .3s cubic-bezier(.22,.68,0,1.2) forwards; opacity:1; }
#toast.hide { animation:toastOut .3s ease forwards; }
</style>
</head>
<body>

<div id="authBox">
  <h2>daily <em style="font-style:italic;color:var(--accent)">planner.</em></h2>
  <input id="u" placeholder="username" autocomplete="username">
  <input id="p" type="password" placeholder="password" autocomplete="current-password">
  <div class="auth-btns">
    <button onclick="login()">Login</button>
    <button class="sec" onclick="register()">Register</button>
  </div>
  <p id="authMsg"></p>
</div>

<div class="planner" id="app" style="display:none">

  <!-- HEADER -->
  <div class="header">
    <h1>daily<br><em>planner.</em></h1>
    <div class="date-box">
      <strong id="dNum"></strong>
      <span id="dName"></span><br><span id="dMonth"></span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab on" onclick="switchTab('today',this)">📋 Today</button>
    <button class="tab"    onclick="switchTab('history',this)">📂 History</button>
  </div>

  <!-- ===== TODAY ===== -->
  <div id="pToday">
    <div class="stats">
      <div class="stat"><div class="slabel">Total</div>  <div class="sval"   id="sTot">0</div></div>
      <div class="stat"><div class="slabel">Done</div>   <div class="sval g" id="sDone">0</div></div>
      <div class="stat"><div class="slabel">Missed</div> <div class="sval r" id="sMiss">0</div></div>
      <div class="stat"><div class="slabel">Upcoming</div><div class="sval b" id="sUp">0</div></div>
    </div>
    <div class="legend">
      <div class="leg"><div class="dot" style="background:#e6a817"></div>Current</div>
      <div class="leg"><div class="dot" style="background:var(--done-border)"></div>Done</div>
      <div class="leg"><div class="dot" style="background:var(--missed-border)"></div>Missed</div>
      <div class="leg"><div class="dot" style="background:var(--upcoming-border)"></div>Upcoming</div>
    </div>
    <div class="body">
      <div class="slabel-row">Today's Focus</div>
      <div class="focus-box">
        <input id="focusIn" class="focus-in" placeholder="What's your #1 priority today?" type="text">
      </div>
      <div class="clock">Now: <b id="clk"></b></div>
      <div class="slabel-row">Schedule</div>
      <div id="sched"></div>
      <button class="add-btn" onclick="addSlot()"><span class="ic">+</span> Add time block</button>
      <br><br>
      <div class="slabel-row">Progress</div>
      <div class="prog-wrap"><div class="prog-bar" id="pBar"></div></div>
      <br>
      <div class="slabel-row">Notes</div>
      <textarea id="notesTA" class="notes-ta" rows="3" placeholder="Jot down ideas, reminders, or thoughts..."></textarea>
    </div>
    <div class="footer">
      <span class="ptext" id="pTxt">0% complete</span>
      <div class="btns">
        <button class="btn primary" onclick="saveDay()">💾 Save Day</button>
        <button class="btn"         onclick="clearDay()">Clear</button>
      </div>
    </div>
  </div>

  <!-- ===== HISTORY ===== -->
  <div id="pHistory" class="hidden">
    <div class="body">
      <div class="slabel-row">Daily Log</div>
      <div id="histList"></div>
      <button class="clear-hist" onclick="clearHistory()">🗑 Clear all history</button>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG — Change API to your deployed Render URL when going live.
// Example: const API = "https://your-app.onrender.com";
// ─────────────────────────────────────────────────────────────────────────────
const API = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost"
  ? "http://127.0.0.1:8000"
  :"https://dailyplanner-v39o.onrender.com"; // ← Replace before deploying

// ── DATE ──────────────────────────────────────────────────────────────────────
const NOW    = new Date();
const DNAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MNAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('dNum').textContent   = NOW.getDate();
document.getElementById('dName').textContent  = DNAMES[NOW.getDay()];
document.getElementById('dMonth').textContent = MNAMES[NOW.getMonth()] + ' ' + NOW.getFullYear();

const TKEY = `planner_${NOW.getFullYear()}_${NOW.getMonth()}_${NOW.getDate()}`;

// ── DEFAULT SCHEDULE ──────────────────────────────────────────────────────────
const DEFAULTS = [
  '4:00 AM','5:00 AM','6:00 AM','7:00 AM','8:00 AM','9:00 AM',
  '10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM',
  '4:00 PM','5:00 PM','6:00 PM','7:00 PM','8:00 PM','9:00 PM',
  '10:00 PM','11:00 PM'
];

// ── TIME UTILS ─────────────────────────────────────────────────────────────────
function toMins(str) {
  if (!str) return -1;
  const m = str.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return -1;
  let h = +m[1], min = +m[2], ap = m[3].toUpperCase();
  if (ap === 'AM' && h === 12) h = 0;
  if (ap === 'PM' && h !== 12) h += 12;
  return h * 60 + min;
}
function nowMins() { const t = new Date(); return t.getHours() * 60 + t.getMinutes(); }

function slotState(timeStr, done) {
  if (done) return 's-done';
  const sm = toMins(timeStr);
  if (sm < 0) return 's-neutral';
  const nm = nowMins();
  const allMins = [...document.querySelectorAll('#sched .slot')]
    .map(s => toMins(s.dataset.t)).filter(t => t > sm);
  const next = allMins.length ? Math.min(...allMins) : sm + 60;
  if (nm >= sm && nm < next) return 's-current';
  if (nm >= next)            return 's-missed';
  return 's-upcoming';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(saved) {
  const c = document.getElementById('sched');
  c.innerHTML = '';
  const slots = saved
    ? saved.slots
    : DEFAULTS.map(time => ({ time, val: '', done: false }));
  slots.forEach((s, i) => makeSlot(s.time, s.val, s.done, i));
  refreshAllStates();
  if (saved) {
    document.getElementById('focusIn').value = saved.focus || '';
    document.getElementById('notesTA').value = saved.notes || '';
  }
  stats();
  setTimeout(autoResizeAll, 50);
}

function makeSlot(time, val, done, idx) {
  const c   = document.getElementById('sched');
  const div = document.createElement('div');
  div.className  = 'slot s-neutral';
  div.dataset.t  = time || '';
  div.style.animationDelay = `${(idx || 0) * 0.028}s`;
  div.innerHTML = `
    <span class="tlabel" style="padding-top:3px">${escHtml(time || '')}</span>
    <textarea class="sinput${done ? ' struck' : ''}" placeholder="—" rows="1"
      oninput="scheduleAutoSave();stats();autoResize(this)">${escHtml(val || '')}</textarea>
    <button class="chk${done ? ' on' : ''}" onclick="toggleDone(this)" style="margin-top:2px">✓</button>
    <span class="now-badge">▶ NOW</span>
  `;
  c.appendChild(div);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── STATE REFRESH ──────────────────────────────────────────────────────────────
function refreshAllStates() {
  document.querySelectorAll('#sched .slot').forEach(s => {
    const done     = s.querySelector('.chk').classList.contains('on');
    const newState = slotState(s.dataset.t, done);
    const curClass = [...s.classList].find(c => c.startsWith('s-'));
    if (curClass !== newState) {
      s.classList.remove(curClass);
      s.classList.add(newState);
    }
  });
}

// ── TOGGLE DONE ───────────────────────────────────────────────────────────────
function toggleDone(btn) {
  const wasOn = btn.classList.contains('on');
  if (wasOn) btn.classList.add('unchecking');
  setTimeout(() => btn.classList.remove('unchecking'), 300);
  btn.classList.toggle('on');
  const inp  = btn.previousElementSibling;
  inp.classList.toggle('struck', btn.classList.contains('on'));
  const slot = btn.closest('.slot');
  slot.className = 'slot ' + slotState(slot.dataset.t, btn.classList.contains('on'));
  scheduleAutoSave();
  stats();
}

// ── ADD SLOT ───────────────────────────────────────────────────────────────────
function addSlot() {
  const c   = document.getElementById('sched');
  const div = document.createElement('div');
  div.className = 'slot s-neutral just-added';
  div.dataset.t = '';
  div.innerHTML = `
    <input class="sinput tlabel" style="color:var(--ink-light);font-size:.65rem;" placeholder="time"
      oninput="this.closest('.slot').dataset.t=this.value;scheduleAutoSave()">
    <input class="sinput" placeholder="Task description" oninput="scheduleAutoSave();stats()">
    <button class="chk" onclick="toggleDone(this)">✓</button>
    <span class="now-badge">▶ NOW</span>
  `;
  c.appendChild(div);
  setTimeout(() => div.classList.remove('just-added'), 700);
  div.querySelectorAll('input')[0].focus();
  stats();
}

// ── STATS ─────────────────────────────────────────────────────────────────────
const _prevStats = { tot: null, done: null, miss: null, up: null };
function stats() {
  let tot = 0, done = 0, miss = 0, up = 0;
  document.querySelectorAll('#sched .slot').forEach(s => {
    const inp    = s.querySelectorAll('.sinput');
    const valInp = inp.length > 1 ? inp[inp.length - 1] : inp[0];
    if (!valInp || !valInp.value.trim()) return;
    tot++;
    const cl = s.classList;
    if      (cl.contains('s-done'))     done++;
    else if (cl.contains('s-missed'))   miss++;
    else if (cl.contains('s-upcoming')) up++;
  });

  const vals = { tot, done, miss, up };
  const ids  = { tot: 'sTot', done: 'sDone', miss: 'sMiss', up: 'sUp' };
  for (const [k, id] of Object.entries(ids)) {
    const el = document.getElementById(id);
    if (_prevStats[k] !== vals[k]) {
      el.textContent = vals[k];
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');
      setTimeout(() => el.classList.remove('pop'), 400);
      _prevStats[k] = vals[k];
    }
  }

  const pct = tot > 0 ? Math.round(done / tot * 100) : 0;
  document.getElementById('pBar').style.width = pct + '%';
  document.getElementById('pTxt').textContent = pct + '% complete';
}

// ── COLLECT SLOTS ──────────────────────────────────────────────────────────────
function collectSlots() {
  return [...document.querySelectorAll('#sched .slot')].map(s => {
    const inps         = s.querySelectorAll('.sinput');
    const isCustomTime = inps.length > 1 && inps[0].tagName === 'INPUT' && inps[0].placeholder === 'time';
    const time = isCustomTime
      ? inps[0].value
      : (s.querySelector('.tlabel')?.textContent || s.dataset.t || '');
    const val  = inps[inps.length - 1]?.value || '';
    const done = s.querySelector('.chk')?.classList.contains('on') || false;
    return { time, val, done };
  });
}

// ── DEBOUNCED AUTO-SAVE ────────────────────────────────────────────────────────
let _saveTimer = null;
function scheduleAutoSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(autoSave, 800);
}

async function autoSave() {
  const token = localStorage.getItem('token');
  const payload = {
    slots: collectSlots(),
    focus: document.getElementById('focusIn').value,
    notes: document.getElementById('notesTA').value
  };
  // Always save to localStorage as fallback
  localStorage.setItem(TKEY, JSON.stringify(payload));
  if (!token) return;
  try {
    await fetch(API + '/save_day', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body:    JSON.stringify({ date_key: TKEY, payload })
    });
  } catch (e) { /* silent fail — localStorage already saved */ }
}

// ── SAVE DAY ──────────────────────────────────────────────────────────────────
async function saveDay() {
  await autoSave();
  const data = {
    slots:     collectSlots(),
    focus:     document.getElementById('focusIn').value,
    notes:     document.getElementById('notesTA').value,
    dateLabel: DNAMES[NOW.getDay()] + ', ' + NOW.getDate() + ' ' + MNAMES[NOW.getMonth()] + ' ' + NOW.getFullYear(),
    dateKey:   TKEY
  };
  let hist    = JSON.parse(localStorage.getItem('planner_hist') || '[]');
  const idx   = hist.findIndex(h => h.dateKey === TKEY);
  if (idx >= 0) hist[idx] = data; else hist.unshift(data);
  if (hist.length > 60) hist = hist.slice(0, 60);
  localStorage.setItem('planner_hist', JSON.stringify(hist));
  toast('Day saved to history ✓');
}

// ── CLEAR TODAY ───────────────────────────────────────────────────────────────
function clearDay() {
  if (!confirm('Clear all entries for today?')) return;
  localStorage.removeItem(TKEY);
  render(null);
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  const rect   = btn.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className   = 'tab-ripple';
  ripple.style.cssText = `width:${btn.offsetWidth}px;height:${btn.offsetWidth}px;left:0;top:${(btn.offsetHeight - btn.offsetWidth) / 2}px`;
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);

  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('pToday').classList.toggle('hidden',   name !== 'today');
  document.getElementById('pHistory').classList.toggle('hidden', name !== 'history');
  if (name === 'history') renderHistory();
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory() {
  const el   = document.getElementById('histList');
  const hist = JSON.parse(localStorage.getItem('planner_hist') || '[]');
  if (!hist.length) {
    el.innerHTML = '<div class="hist-empty">No history yet.<br>Complete your day and press <b>💾 Save Day</b> to log your progress here.</div>';
    return;
  }
  el.innerHTML = '';
  hist.forEach((day, i) => {
    const filled = (day.slots || []).filter(s => s.val);
    const done   = filled.filter(s => s.done).length;
    const miss   = filled.length - done;
    const div    = document.createElement('div');
    div.className = 'hday';
    div.style.animationDelay = `${i * 0.06}s`;
    div.innerHTML = `
      <div class="hday-head" onclick="this.nextElementSibling.classList.toggle('hidden')">
        <span class="hd">${day.dateLabel || 'Unknown date'}</span>
        <span>
          <span class="hs">✓ ${done}/${filled.length}</span>
          ${miss > 0 ? `<span class="hm">✗ ${miss} missed</span>` : ''}
        </span>
      </div>
      <div class="htasks hidden">
        ${filled.map((s, j) => `
          <div class="htask" style="animation-delay:${j * .04}s">
            <div class="hdot ${s.done ? 'd' : 'm'}"></div>
            <span class="htime">${escHtml(s.time)}</span>
            <span class="htxt">${escHtml(s.val)}</span>
          </div>`).join('')}
        ${day.notes ? `<div class="hnotes">📝 ${escHtml(day.notes)}</div>` : ''}
        ${day.focus ? `<div class="hnotes">🎯 Focus: ${escHtml(day.focus)}</div>` : ''}
      </div>`;
    el.appendChild(div);
  });
}

function clearHistory() {
  if (!confirm('Delete all history? This cannot be undone.')) return;
  localStorage.removeItem('planner_hist');
  renderHistory();
  toast('History cleared');
}

// ── LIVE CLOCK ─────────────────────────────────────────────────────────────────
function tick() {
  const t  = new Date();
  const h  = t.getHours(), m = t.getMinutes(), s = t.getSeconds();
  const hh = (h % 12) || 12, mm = String(m).padStart(2, '0'), ss = String(s).padStart(2, '0');
  document.getElementById('clk').textContent = `${hh}:${mm}:${ss} ${h >= 12 ? 'PM' : 'AM'}`;
  if (s === 0) { refreshAllStates(); stats(); }
}
setInterval(tick, 1000);
tick();

// ── TOAST ──────────────────────────────────────────────────────────────────────
let _toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  clearTimeout(_toastTimer);
  t.textContent = msg;
  t.className   = 'show';
  _toastTimer = setTimeout(() => {
    t.className = 'hide';
    setTimeout(() => { t.className = ''; }, 320);
  }, 2200);
}

// ── AUTO RESIZE TEXTAREA ────────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
function autoResizeAll() {
  document.querySelectorAll('#sched textarea.sinput').forEach(autoResize);
}

// ── AUTH ───────────────────────────────────────────────────────────────────────
async function register() {
  const authMsg = document.getElementById('authMsg');
  authMsg.style.color = 'var(--ink-light)';
  authMsg.textContent = 'Registering...';
  try {
    const r = await fetch(API + '/register', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        username: document.getElementById('u').value.trim(),
        password: document.getElementById('p').value
      })
    });
    if (r.ok) {
      authMsg.style.color = '#4d8830';
      authMsg.textContent = 'Registered! Now login.';
    } else {
      const err = await r.json().catch(() => ({}));
      authMsg.style.color = 'var(--missed-border)';
      authMsg.textContent = err.detail || 'Username already exists.';
    }
  } catch (e) {
    authMsg.style.color = 'var(--missed-border)';
    authMsg.textContent = 'Cannot reach server. Check your connection.';
  }
}

async function login() {
  const authMsg = document.getElementById('authMsg');
  authMsg.style.color = 'var(--ink-light)';
  authMsg.textContent = 'Logging in...';
  try {
    const fd = new FormData();
    fd.append('username', document.getElementById('u').value.trim());
    fd.append('password', document.getElementById('p').value);
    const r = await fetch(API + '/login', { method: 'POST', body: fd });
    if (!r.ok) {
      authMsg.style.color = 'var(--missed-border)';
      authMsg.textContent = 'Invalid username or password.';
      return;
    }
    const data = await r.json();
    localStorage.setItem('token', data.access_token);
    showApp();
  } catch (e) {
    authMsg.style.color = 'var(--missed-border)';
    authMsg.textContent = 'Cannot reach server. Check your connection.';
  }
}

function showApp() {
  document.getElementById('authBox').style.display = 'none';
  document.getElementById('app').style.display     = 'block';
  loadFromServer();
}

async function loadFromServer() {
  const token = localStorage.getItem('token');
  if (!token) return;
  try {
    const r = await fetch(API + '/get_day/' + TKEY, {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!r.ok) throw new Error('not ok');
    const d = await r.json();
    if (d.data) {
      // FIX: d.data is now a valid JSON string — parse it correctly
      render(JSON.parse(d.data));
    } else {
      const local = localStorage.getItem(TKEY);
      render(local ? JSON.parse(local) : null);
    }
  } catch (e) {
    const local = localStorage.getItem(TKEY);
    render(local ? JSON.parse(local) : null);
  }
}

// ── INIT ───────────────────────────────────────────────────────────────────────
document.getElementById('focusIn').addEventListener('input', scheduleAutoSave);
document.getElementById('notesTA').addEventListener('input', scheduleAutoSave);

// Allow Enter key to submit login
document.getElementById('p').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// Auto-login if token already stored
if (localStorage.getItem('token')) {
  showApp();
} else {
  // Show app in offline mode (no login required for local use)
  document.getElementById('authBox').style.display = 'none';
  document.getElementById('app').style.display     = 'block';
  const local = localStorage.getItem(TKEY);
  render(local ? JSON.parse(local) : null);
}
</script>
</body>
</html>
